services:
  - type: web
    name: assetminder-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JOBBER_CLIENT_ID
        sync: false
      - key: JOBBER_CLIENT_SECRET
        sync: false
      - key: JOBBER_REDIRECT_URI
        sync: false
      - key: NODE_ENV
        value: production
