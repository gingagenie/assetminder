services:
  - type: web
    name: assetminder-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JOBBER_CLIENT_ID
        sync: false
      - key: JOBBER_CLIENT_SECRET
        sync: false
      - key: JOBBER_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: assetminder-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
